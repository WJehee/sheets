<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Time Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
  <style>
    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10pt;
      color: #1a1a1a;
      background: #888;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 8mm;
      margin: 10mm auto;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }

    @media print {
      body { background: none; }
      .page {
        margin: 0;
        box-shadow: none;
        min-height: auto;
      }
    }

    /* --- Header --- */

    .sheet-title {
      font-size: 18pt;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 2mm;
    }

    /* --- Days --- */

    #days {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .day {
      flex: 1;
      display: flex;
      border-bottom: 1.5px solid #333;
    }
    .day:last-child { border-bottom: none; }

    /* sideways day-notes column on the left */
    .day-side {
      width: 14mm;
      flex-shrink: 0;
      border-right: 1.5px solid #333;
      writing-mode: vertical-rl;
      display: flex;
      align-items: center;
      gap: 2mm;
      padding: 3mm 1mm;
      font-size: 8.5pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #444;
    }

    .day-side .day-box {
      min-block-size: 11mm;
      border-block-end: 1px solid #1a1a1a;
    }
    .day-side .day-fill {
      flex: 1;
      min-block-size: 0;
    }

    .day-watches {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .watch {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 3mm;
      padding: 1mm 2mm;
      border-bottom: 0.75px solid #ccc;
    }
    .watch:last-child { border-bottom: none; }

    .turns {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5mm 4mm;
      align-items: center;
    }

    .hour {
      display: flex;
      align-items: center;
      gap: 1.5mm;
    }

    .hour svg {
      width: 11mm;
      height: 11mm;
    }

    .torch {
      display: flex;
      align-items: center;
      margin-left: 0.5mm;
      color: #555;
    }
    .torch .ra { font-size: 13pt; line-height: 1; }

    .hour-sep {
      width: 0;
      border-left: 1px dashed #bbb;
      align-self: stretch;
    }

    /* lantern reminder at the end of each watch */
    .lantern {
      display: flex;
      align-items: center;
      margin-left: auto;
      padding-left: 2mm;
      color: #555;
      flex-shrink: 0;
    }
    .lantern .ra { font-size: 15pt; line-height: 1; }
  </style>
</head>
<body>
  <!-- One reusable 3-wedge "turn" circle: each wedge = one 10-minute turn, a full circle = 30 min = roll an encounter -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="turn-circle" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="20" y1="20" x2="20"   y2="2"  stroke="#1a1a1a" stroke-width="1.4"/>
      <line x1="20" y1="20" x2="35.6" y2="29" stroke="#1a1a1a" stroke-width="1.4"/>
      <line x1="20" y1="20" x2="4.4"  y2="29" stroke="#1a1a1a" stroke-width="1.4"/>
    </symbol>
  </svg>

  <div class="page">
    <div class="sheet-title">Dungeon Time Tracker</div>
    <div id="days"></div>
  </div>

  <script>
    // A day is 6 watches; each watch is 4 hours = 24 turns = 8 circles, with a
    // torch reminder every 2 circles (1 hour) and a lantern reminder per watch.
    // Encounter rolls happen on every completed circle (every 30 min).
    // Bump DAYS to pack more onto a sheet (rows shrink to fit).
    const WATCHES_PER_DAY = 6;
    const DAYS = 3;

    const CIRCLE  = '<svg><use href="#turn-circle"/></svg>';
    const TORCH   = '<span class="torch"><i class="ra ra-torch"></i></span>';
    const LANTERN = '<span class="lantern"><i class="ra ra-lantern-flame"></i></span>';

    const root = document.getElementById("days");

    for (let d = 0; d < DAYS; d++) {
      const day = document.createElement("div");
      day.className = "day";

      let watches = "";
      for (let w = 0; w < WATCHES_PER_DAY; w++) {
        // 4 hours, each = 2 circles then a torch reminder
        let hours = "";
        for (let h = 0; h < 4; h++) {
          hours += '<div class="hour">' + CIRCLE + CIRCLE + TORCH + '</div>';
          if (h < 3) hours += '<div class="hour-sep"></div>';
        }
        watches += '<div class="watch"><div class="turns">' + hours + '</div>' + LANTERN + '</div>';
      }

      day.innerHTML =
        '<div class="day-side">Day <span class="day-box"></span><span class="day-fill"></span></div>' +
        '<div class="day-watches">' + watches + '</div>';

      root.appendChild(day);
    }
  </script>
</body>
</html>
