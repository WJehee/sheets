<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Sheet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
  <style>
    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10pt;
      color: #1a1a1a;
      background: #888;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 8mm;
      margin: 10mm auto;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }

    @media print {
      body { background: none; }
      .page {
        margin: 0;
        box-shadow: none;
        min-height: auto;
      }
    }

    /* --- Header --- */

    .sheet-title {
      display: flex;
      align-items: baseline;
      font-size: 18pt;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 2mm;
    }

    .sheet-title-text {
    }

    .player-name {
      display: flex;
      align-items: baseline;
      gap: 2mm;
      margin-left: auto;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10pt;
      font-weight: 400;
      white-space: nowrap;
    }

    .player-name .field-label {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }

    .player-name .field-value {
      border-bottom: 1px solid #999;
      min-width: 50mm;
      min-height: 6mm;
      padding: 0.5mm 1mm;
    }

    /* --- Sections --- */

    .section {
      border: 1.5px solid #333;
      padding: 3mm;
    }

    .section-label {
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      color: #fff;
      background: #333;
      padding: 1mm 3mm;
      margin: -3mm -3mm 2.5mm -3mm;
    }

    /* --- Character Info --- */

    .info-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 3mm;
    }

    .info-fields {
      display: flex;
      flex-direction: column;
      gap: 2mm;
    }

    .portrait {
      border: 1.5px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portrait-label {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #bbb;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field-label {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 0.5mm;
    }

    .field-value {
      border-bottom: 1px solid #999;
      min-height: 6mm;
      padding: 0.5mm 1mm;
      font-size: 10pt;
    }

    /* --- Attributes --- */

    .attributes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3mm;
      justify-items: center;
    }

    .attr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1mm;
    }

    .attr-name {
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .attr-stopper {
      width: 11mm;
      height: 11mm;
      border: 1.5px solid #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14pt;
      color: #333;
      background: #fff;
      position: relative;
      z-index: 1;
      margin-bottom: -1.5mm;
    }

    .attr-vial {
      width: 22mm;
      height: auto;
    }

    .attr-humour {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-top: 1mm;
    }

    .attr-humour-value {
      width: 22mm;
      min-height: 6mm;
      border-bottom: 1px solid #999;
      text-align: center;
      font-size: 9pt;
    }

    /* --- Defense --- */

    .defense-row {
      display: flex;
      gap: 3mm;
      align-items: center;
    }

    .defense-block {
      display: flex;
      align-items: center;
      gap: 2mm;
    }

    .defense-label {
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .armor-value {
      width: 12mm;
      height: 10mm;
      border: 1.5px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14pt;
      font-weight: 700;
      text-align: center;
    }

    .skin-pips {
      display: flex;
      gap: 2mm;
    }

    .pip {
      width: 5mm;
      height: 5mm;
      border: 1.5px solid #333;
      border-radius: 50%;
    }

    .possessions-divider {
      width: 1px;
      background: #999;
      align-self: stretch;
      margin: 0 2mm;
    }

    .section-inner-divider {
      border-top: 1.5px solid #333;
      margin: 3mm -3mm;
    }

    /* --- Equipped --- */

    /* --- Hands --- */

    .hands-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5mm;
    }

    .hand-slot {
      min-height: 8mm;
      font-size: 9pt;
      position: relative;
    }

    .hand-slot::before {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 4mm;
      height: 4mm;
      border: 1.5px solid #999;
    }

    .hand-slot:first-child {
      padding: 1.5mm 8mm 1.5mm 3mm;
    }

    .hand-slot:first-child::before {
      right: 2mm;
    }

    .hand-slot:last-child {
      padding: 1.5mm 3mm 1.5mm 8mm;
    }

    .hand-slot:last-child::before {
      left: 2mm;
    }

    .hand-label {
      font-size: 6pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
    }

    .hand-label-right {
      display: block;
      text-align: right;
    }

    .equip-divider {
      border-top: 1.5px solid #333;
      margin: 2.5mm -3mm;
      position: relative;
    }

    .equip-divider::after {
      content: attr(data-label);
      position: absolute;
      top: -1.2em;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 0 2mm;
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    /* --- Inventory containers --- */

    .inventory-stack {
      display: flex;
      flex-direction: column;
      gap: 4mm;
    }

    .container {
      border: 1.5px solid #333;
      padding: 3mm;
    }

    .container-name {
      display: flex;
      flex-direction: column;
      margin-bottom: 2.5mm;
    }

    .container-name .field-label {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 0.5mm;
    }

    .container-name .field-value {
      border-bottom: 1px solid #999;
      min-height: 6mm;
      padding: 0.5mm 1mm;
      font-size: 10pt;
    }

    .container-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5mm;
    }

    .container-col {
      display: flex;
      flex-direction: column;
    }

    .container-slot {
      min-height: 8mm;
      font-size: 9pt;
      position: relative;
    }

    .container-slot::before {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 4mm;
      height: 4mm;
      border: 1.5px solid #999;
    }

    .container-slot::after {
      content: "";
      position: absolute;
      bottom: 0;
      border-bottom: 1px dotted #999;
    }

    .container-slot:last-child::after {
      border-bottom: none;
    }

    .container-col:first-child .container-slot {
      padding: 1.5mm 8mm 1.5mm 3mm;
    }

    .container-col:first-child .container-slot::before {
      right: 2mm;
    }

    .container-col:first-child .container-slot::after {
      left: 0;
      right: 7mm;
    }

    .container-col:last-child .container-slot {
      padding: 1.5mm 3mm 1.5mm 8mm;
    }

    .container-col:last-child .container-slot::before {
      left: 2mm;
    }

    .container-col:last-child .container-slot::after {
      right: 0;
      left: 7mm;
    }
  </style>
</head>
