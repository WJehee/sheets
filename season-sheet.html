<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season Sheet</title>
  <style>
    @page { size: A4 portrait; margin: 6mm; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10pt;
      color: #1a1a1a;
      background: #888;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 5mm;
      margin: 10mm auto;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 2.5mm;
    }

    @media print {
      body { background: none; }
      .page { margin: 0; box-shadow: none; min-height: auto; }
    }

    /* --- Header --- */

    .sheet-title {
      display: flex;
      align-items: baseline;
      gap: 3mm;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1.5px solid #1a1a1a;
      padding-bottom: 1.5mm;
    }

    .write-line {
      display: inline-block;
      border-bottom: 1.5px solid #1a1a1a;
      min-width: 55mm;
      padding: 0 1mm;
    }

    /* --- Months --- */

    .months {
      display: flex;
      flex-direction: column;
      flex: 1;
      border: 1.5px solid #333;
    }

    .month {
      display: flex;
      flex: 1;
    }

    .month:not(:last-child) {
      border-bottom: 1.5px solid #333;
    }

    /* narrow vertical month label on the left */
    .month-side {
      width: 9mm;
      flex-shrink: 0;
      border-right: 1px solid #999;
      writing-mode: vertical-rl;
      display: flex;
      align-items: center;
      gap: 2mm;
      padding: 1.5mm 0;
      font-size: 7.5pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #1a1a1a;
      overflow: hidden;
    }

    .month-side .month-fill {
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      flex: 1;
    }

    .daycell {
      border-right: 1px solid #999;
      border-bottom: 1px solid #999;
      padding: 0.8mm;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }

    /* outer cell edges are handled by the frame / month dividers, so drop them */
    .daycell:nth-child(7n) { border-right: none; }   /* last column */
    .daycell:nth-child(n+22) { border-bottom: none; } /* last row */

    .daycell .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1mm;
    }

    .id {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5mm;
    }

    .daynum { font-size: 8pt; font-weight: 700; line-height: 1; }

    .moon { width: 5mm; height: 5mm; flex-shrink: 0; }

    .daycell .clock { width: 12mm; height: 12mm; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const MONTHS_PER_SEASON = 3;
    const DAYS_PER_MONTH = 28; // 4 weeks of 7

    // Six watches, 4 hours each. tone sets how the wedge is shaded (day/night dial).
    const WATCH_TONES = ["night", "dusk", "day", "day", "dusk", "night"];
    const TONE_FILL = { night: "#c9c9c9", dusk: "#ececec", day: "#ffffff" };

    function pt(cx, cy, r, deg) {
      const a = (deg * Math.PI) / 180;
      return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
    }

    // 6-wedge day clock, clockwise from midnight at top, night watches shaded.
    function dayClock() {
      const cx = 20, cy = 20, r = 18;
      let wedges = "";
      for (let i = 0; i < 6; i++) {
        const [x0, y0] = pt(cx, cy, r, i * 60);
        const [x1, y1] = pt(cx, cy, r, (i + 1) * 60);
        wedges += `<path d="M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} `
                + `A${r},${r} 0 0 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z" `
                + `fill="${TONE_FILL[WATCH_TONES[i]]}" stroke="#1a1a1a" stroke-width="1.2"/>`;
      }
      return `<svg class="clock" viewBox="0 0 40 40">${wedges}</svg>`;
    }

    // Moon phase for a day of the month. Each 28-day month is exactly one lunar
    // cycle: day 1 new moon, ~day 15 full, waning back to new. Lit = white,
    // shadow = dark. Identical pattern every month.
    function moonSVG(day) {
      const phase = ((day - 1) % DAYS_PER_MONTH) / DAYS_PER_MONTH; // 0 new .. 0.5 full
      const cx = 10, cy = 10, r = 9;
      const a = Math.cos(phase * 2 * Math.PI) * r;     // signed terminator radius
      const top = `${cx},${cy - r}`, bot = `${cx},${cy + r}`, ax = Math.abs(a).toFixed(2);
      let lit;
      if (phase < 0.5) {  // waxing, lit on the right
        lit = `M${top} A${r},${r} 0 0 1 ${bot} A${ax},${r} 0 0 ${a >= 0 ? 0 : 1} ${top} Z`;
      } else {            // waning, lit on the left
        lit = `M${top} A${r},${r} 0 0 0 ${bot} A${ax},${r} 0 0 ${a >= 0 ? 1 : 0} ${top} Z`;
      }
      return `<svg class="moon" viewBox="0 0 20 20" aria-hidden="true">`
           + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#2b2b2b"/>`
           + `<path d="${lit}" fill="#fff"/>`
           + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>`
           + `</svg>`;
    }

    let months = "";
    for (let m = 0; m < MONTHS_PER_SEASON; m++) {
      let cells = "";
      for (let d = 1; d <= DAYS_PER_MONTH; d++) {
        cells +=
          `<div class="daycell">` +
            `<div class="top">` +
              `<div class="id"><span class="daynum">${d}</span>` + moonSVG(d) + `</div>` +
              dayClock() +
            `</div>` +
          `</div>`;
      }
      months +=
        `<div class="month">` +
          `<div class="month-side">Month <span class="month-fill"></span></div>` +
          `<div class="grid">${cells}</div>` +
        `</div>`;
    }

    document.getElementById("root").innerHTML =
      `<div class="page">` +
        `<div class="sheet-title">Season</div>` +
        `<div class="months">${months}</div>` +
      `</div>`;
  </script>
</body>
</html>
