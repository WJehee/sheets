<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unseason Sheet</title>
  <style>
    @page { size: A4 portrait; margin: 6mm; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 10pt;
      color: #1a1a1a;
      background: #888;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 5mm;
      margin: 10mm auto;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 2.5mm;
    }

    @media print {
      body { background: none; }
      .page { margin: 0; box-shadow: none; min-height: auto; }
    }

    /* --- Header --- */

    .sheet-title {
      display: flex;
      align-items: baseline;
      gap: 3mm;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1.5px solid #1a1a1a;
      padding-bottom: 1.5mm;
    }

    .sheet-title .label { font-size: 8pt; font-weight: 600; letter-spacing: 1px; }

    .write-line {
      display: inline-block;
      border-bottom: 1.5px solid #1a1a1a;
      min-width: 55mm;
      padding: 0 1mm;
    }

    /* --- Section headings --- */

    .section-head {
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1mm;
    }

    /* --- Weeks tracker --- */

    .weeks {
      display: flex;
      flex-direction: column;
      height: 66mm;        /* 3 short weeks, ~22mm each */
      flex-shrink: 0;
      border: 1.5px solid #333;
    }

    .week {
      display: flex;
      flex: 1;
    }

    .week:not(:last-child) {
      border-bottom: 1.5px solid #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      flex: 1;
    }

    .daycell {
      border-right: 1px solid #999;
      padding: 0.8mm;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }

    .daycell:nth-child(7n) { border-right: none; }   /* last column */

    .daycell .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1mm;
    }

    .id {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5mm;
    }

    .daynum { font-size: 8pt; font-weight: 700; line-height: 1; }

    .moon { width: 5mm; height: 5mm; flex-shrink: 0; }

    .daycell .clock { width: 12mm; height: 12mm; flex-shrink: 0; }

    /* --- Weather: hex flower + key, side by side, no boxes --- */

    .weather {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .weather-row {
      display: flex;
      gap: 6mm;
      height: 72mm;
      align-items: stretch;
    }

    /* Hex flower (compact, fixed width so it stays small) */

    .hexflower {
      flex: 0 0 52mm;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .hexflower svg { width: 100%; height: 100%; }

    .hex { fill: #fff; stroke: #1a1a1a; stroke-width: 1; }
    .hex-num {
      font-size: 5.5px;
      font-weight: 700;
      fill: #b0b0b0;
      text-anchor: middle;
    }

    /* Weather key */

    .key-list {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .key-row {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2mm;
    }

    .key-num {
      width: 6mm;
      flex-shrink: 0;
      text-align: center;
      font-size: 8pt;
      font-weight: 700;
      color: #1a1a1a;
    }

    .key-line {
      flex: 1;
      align-self: stretch;
      border-bottom: 1px solid #bbb;
    }

    /* --- Encounter table (2d6) --- */

    .encounters {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .enc-table {
      flex: 1;
      border-collapse: collapse;
      width: 100%;
      border: 1.5px solid #333;
    }

    .enc-table th {
      font-size: 7pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      border-bottom: 1.5px solid #333;
      padding: 1mm 2mm;
      text-align: left;
    }

    .enc-table td {
      border-bottom: 1px solid #bbb;
      padding: 0 2mm;
    }

    .enc-table tr:last-child td { border-bottom: none; }

    .enc-roll {
      width: 12mm;
      font-weight: 700;
      text-align: center;
      border-right: 1px solid #bbb;
      color: #1a1a1a;
    }

    .enc-pips { font-size: 6.5pt; color: #888; font-weight: 400; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const WEEKS = 3; // an unseason is short
    const DAYS_PER_WEEK = 7;
    const LUNAR_CYCLE = 28; // days per full moon cycle

    // Six watches, 4 hours each. tone sets how the wedge is shaded (day/night dial).
    const WATCH_TONES = ["night", "dusk", "day", "day", "dusk", "night"];
    const TONE_FILL = { night: "#c9c9c9", dusk: "#ececec", day: "#ffffff" };

    function pt(cx, cy, r, deg) {
      const a = (deg * Math.PI) / 180;
      return [cx + r * Math.sin(a), cy - r * Math.cos(a)];
    }

    // 6-wedge day clock, clockwise from midnight at top, night watches shaded.
    function dayClock() {
      const cx = 20, cy = 20, r = 18;
      let wedges = "";
      for (let i = 0; i < 6; i++) {
        const [x0, y0] = pt(cx, cy, r, i * 60);
        const [x1, y1] = pt(cx, cy, r, (i + 1) * 60);
        wedges += `<path d="M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} `
                + `A${r},${r} 0 0 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z" `
                + `fill="${TONE_FILL[WATCH_TONES[i]]}" stroke="#1a1a1a" stroke-width="1.2"/>`;
      }
      return `<svg class="clock" viewBox="0 0 40 40">${wedges}</svg>`;
    }

    // Moon phase for an absolute day of the season. One lunar cycle = 28 days:
    // day 1 new moon, ~day 15 full, waning back to new. Lit = white, shadow = dark.
    function moonSVG(day) {
      const phase = ((day - 1) % LUNAR_CYCLE) / LUNAR_CYCLE; // 0 new .. 0.5 full
      const cx = 10, cy = 10, r = 9;
      const a = Math.cos(phase * 2 * Math.PI) * r;     // signed terminator radius
      const top = `${cx},${cy - r}`, bot = `${cx},${cy + r}`, ax = Math.abs(a).toFixed(2);
      let lit;
      if (phase < 0.5) {  // waxing, lit on the right
        lit = `M${top} A${r},${r} 0 0 1 ${bot} A${ax},${r} 0 0 ${a >= 0 ? 0 : 1} ${top} Z`;
      } else {            // waning, lit on the left
        lit = `M${top} A${r},${r} 0 0 0 ${bot} A${ax},${r} 0 0 ${a >= 0 ? 1 : 0} ${top} Z`;
      }
      return `<svg class="moon" viewBox="0 0 20 20" aria-hidden="true">`
           + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#2b2b2b"/>`
           + `<path d="${lit}" fill="#fff"/>`
           + `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>`
           + `</svg>`;
    }

    // --- Weeks tracker (8 weeks of 7 days, days numbered across the whole season) ---
    let weeks = "";
    for (let w = 0; w < WEEKS; w++) {
      let cells = "";
      for (let d = 1; d <= DAYS_PER_WEEK; d++) {
        const day = w * DAYS_PER_WEEK + d; // 1..21, drives the moon phase
        cells +=
          `<div class="daycell">` +
            `<div class="top">` +
              `<div class="id"><span class="daynum">${day}</span>` + moonSVG(day) + `</div>` +
              dayClock() +
            `</div>` +
          `</div>`;
      }
      weeks +=
        `<div class="week">` +
          `<div class="grid">${cells}</div>` +
        `</div>`;
    }

    // --- Weather hex flower (19 hexes, flat-top, columns 3-4-5-4-3) ---
    // Empty hexes the GM fills with weather conditions, navigated with 2d6.
    function hexPoints(cx, cy, r) {
      let p = "";
      for (let i = 0; i < 6; i++) {
        const a = (i * 60) * Math.PI / 180; // flat-top: vertices at 0,60,...,300
        p += `${(cx + r * Math.cos(a)).toFixed(2)},${(cy + r * Math.sin(a)).toFixed(2)} `;
      }
      return p.trim();
    }

    function hexFlower() {
      const r = 11;                       // hex radius (centre to vertex)
      const colStep = 1.5 * r;            // horizontal centre-to-centre
      const rowStep = Math.sqrt(3) * r;   // vertical centre-to-centre in a column
      const counts = [3, 4, 5, 4, 3];
      const cx0 = r + 1;                  // left margin
      const cyMid = rowStep * 2.5 + 1;    // centre line (tallest column has 5)

      let hexes = "", n = 0;
      counts.forEach((count, c) => {
        const cx = cx0 + c * colStep;
        for (let k = 0; k < count; k++) {
          n++;
          const cy = cyMid + (k - (count - 1) / 2) * rowStep;
          hexes +=
            `<polygon class="hex" points="${hexPoints(cx, cy, r)}"/>` +
            `<text class="hex-num" x="${cx.toFixed(2)}" y="${(cy - r + 5).toFixed(2)}">${n}</text>`;
        }
      });

      const W = cx0 + 4 * colStep + r + 1;
      const H = cyMid + rowStep * 2.5 + 1;
      return `<svg viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" preserveAspectRatio="xMidYMid meet">${hexes}</svg>`;
    }

    // --- Weather key (one blank line per hex, matching the flower's numbers) ---
    let keyRows = "";
    for (let h = 1; h <= 19; h++) {
      keyRows +=
        `<div class="key-row">` +
          `<span class="key-num">${h}</span>` +
          `<span class="key-line"></span>` +
        `</div>`;
    }

    // --- Random encounters (empty 2d6 table) ---
    const PIPS = { // rough 2d6 combinations, a hint of how likely each total is
      2: 1, 3: 2, 4: 3, 5: 4, 6: 5, 7: 6, 8: 5, 9: 4, 10: 3, 11: 2, 12: 1
    };
    let encRows = "";
    for (let t = 2; t <= 12; t++) {
      encRows +=
        `<tr>` +
          `<td class="enc-roll">${t}<div class="enc-pips">${PIPS[t]} in 36</div></td>` +
          `<td></td>` +
        `</tr>`;
    }

    document.getElementById("root").innerHTML =
      `<div class="page">` +
        `<div class="sheet-title">Unseason` +
          `<span class="write-line"></span>` +
        `</div>` +

        `<div class="section-head">Time Tracker &mdash; 3 Weeks</div>` +
        `<div class="weeks">${weeks}</div>` +

        `<div class="weather">` +
          `<div class="section-head">Weather</div>` +
          `<div class="weather-row">` +
            `<div class="hexflower">${hexFlower()}</div>` +
            `<div class="key-list">${keyRows}</div>` +
          `</div>` +
        `</div>` +

        `<div class="encounters">` +
          `<div class="section-head">Random Encounters &mdash; 2d6</div>` +
          `<table class="enc-table">` +
            `<thead><tr><th>Roll</th><th>Encounter</th></tr></thead>` +
            `<tbody>${encRows}</tbody>` +
          `</table>` +
        `</div>` +
      `</div>`;
  </script>
</body>
</html>
